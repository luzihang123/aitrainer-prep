<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" role="img" aria-label="AI 训练师备考手册">
  <title>AI 训练师备考手册</title>
  <desc>指南针图标加上中文站名，强调"性价比导向、推荐学习路径"的产品理念。</desc>

  <!-- 指南针外环 -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- 北极星标记 -->
  <circle cx="50" cy="16" r="2.5" fill="currentColor"/>
  <!-- 指针实心部分（指北） -->
  <polygon points="50,20 55,52 50,48 45,52" fill="currentColor"/>
  <!-- 指针空心部分（指南） -->
  <polygon points="50,80 45,48 50,52 55,48" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- 中心轴 -->
  <circle cx="50" cy="50" r="2.5" fill="white" stroke="currentColor" stroke-width="1.5"/>

  <!-- 文字 -->
  <text x="108" y="48" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="currentColor">AI 训练师备考手册</text>
  <text x="108" y="72" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="currentColor" opacity="0.6">aitrainer-prep · open source · always free</text>
</svg>
