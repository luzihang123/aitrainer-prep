      .line-green { fill: none; stroke: #5fb77d; stroke-width: 3; stroke-linecap: round; }
      .line-blue { fill: none; stroke: #5aa7d8; stroke-width: 3; stroke-linecap: round; }
      .line-pink { fill: none; stroke: #d56aa0; stroke-width: 3; stroke-linecap: round; }
