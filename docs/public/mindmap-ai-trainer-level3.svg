      .green { stroke: #5fb77d; }
      .blue { stroke: #5aa7d8; }
      .pink { stroke: #d56aa0; }
      .card { fill: #ffffff; stroke-width: 1.5; filter: drop-shadow(0 4px 14px rgba(24, 39, 75, .08)); }
